<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Command Center Elite+</title>
    <style>
        :root { --cols: 4; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 1680px; margin: auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); }

        .controls-bar { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .slider-wrap { display: flex; align-items: center; gap: 12px; font-weight: bold; }

        #progress-container { background:#e9ecef; border-radius:12px; margin-bottom:25px; overflow:hidden; border:1px solid #ccc; }
        #progress-bar { background: linear-gradient(90deg, #28a745, #218838); height:42px; width:0%; text-align:center; color:white; font-weight:bold; line-height:42px; transition:width 0.5s; }

        .section-wrapper { margin-bottom: 28px; border-radius: 12px; border: 1px solid #ddd; background:#fff; overflow:hidden; }
        .section-wrapper.collapsed .task-grid { display: none; }

        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            color: white; padding: 14px 20px; cursor: grab; font-weight: bold; text-transform: uppercase;
        }
        .header-btns button {
            padding: 5px 11px; font-size: 11px; border: none; border-radius: 5px; cursor: pointer;
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(var(--cols), 1fr);
            gap: 18px; padding: 16px; background: #fdfdfd;
        }
        @media (max-width: 1200px) {
            .task-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        }

        .task-item {
            background: #fff; padding: 16px; border-radius: 10px; border: 2px solid #eee;
            position: relative; transition: all 0.2s; cursor: grab;
            display: flex; flex-direction: column; gap: 12px;
        }
        .task-item:hover { border-color: #007bff; box-shadow: 0 6px 16px rgba(0,123,255,0.12); }
        .task-item.dragging { opacity: 0.45; border: 2px dashed #007bff; }

        .task-top { display: flex; align-items: flex-start; gap: 10px; }
        .task-name { font-weight: bold; flex-grow: 1; outline: none; font-size: 14.5px; }

        .task-check { width: 24px; height: 24px; cursor: pointer; margin-top: 2px; }

        .link-btn {
            display: block; padding: 11px; color: white; text-decoration: none;
            border-radius: 6px; font-weight: bold; text-align: center;
        }

        .task-note {
            font-size: 12.5px; background: #fffde7; padding: 10px; border-radius: 6px;
            border: 1px solid #ffe57f; min-height: 50px; outline: none;
        }

        .status-badge {
            font-size: 12px; padding: 6px 12px; border-radius: 6px; color: white; 
            font-weight: bold; cursor: pointer; display: inline-block;
        }

        .move-menu { width: 100%; font-size: 12px; padding: 6px; border-radius: 5px; }
        .del-task { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #aaa; font-size: 22px; cursor: pointer; }
        .del-task:hover { color: #e74c3c; }

        .edit-link-btn {
            font-size: 11px; color: #0066cc; cursor: pointer; text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="controls-bar">
        <div class="slider-wrap">
            <span>Columns:</span>
            <input type="range" min="2" max="6" value="4" id="colSlider" oninput="updateCols(this.value)">
            <span id="colVal">4 Columns</span>
        </div>
        <div>
            <button onclick="exportBackup()" style="background:#28a745;color:white;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;">💾 Backup</button>
            <button onclick="document.getElementById('importFile').click()" style="background:#ffc107;color:black;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;">📂 Restore</button>
            <input type="file" id="importFile" style="display:none;" onchange="importBackup(event)">
        </div>
    </div>

    <div id="progress-container"><div id="progress-bar">Daily Goal: 0%</div></div>
    <div id="sections-container"></div>

    <div style="text-align:center; margin-top:40px;">
        <button onclick="createNewSection()" style="background:#007bff;color:white;border:none;padding:14px 36px;border-radius:10px;font-size:16px;cursor:pointer;">
            + ADD NEW CATEGORY
        </button>
    </div>
</div>

<script>
    let tasks = [];
    let categories = [];
    let folded = {};

    function migrateData() {
        const oldTasks = JSON.parse(localStorage.getItem('tasks_v4') || localStorage.getItem('mainTasks') || localStorage.getItem('tasks_elite') || '[]');
        const oldCats = JSON.parse(localStorage.getItem('cats_v4') || localStorage.getItem('categories') || localStorage.getItem('cats_elite') || '[]');
        const oldFolded = JSON.parse(localStorage.getItem('foldedSections') || localStorage.getItem('folded_elite') || '{}');

        if (oldTasks.length > 0) tasks = oldTasks;
        if (oldCats.length > 0) categories = oldCats;
        if (Object.keys(oldFolded).length > 0) folded = oldFolded;

        if (categories.length === 0) {
            categories = [
                { id: 'c1', name: 'Daily Traffic Routine', color: '#007bff' },
                { id: 'c2', name: 'Research Hub', color: '#0066cc' }
            ];
        }
    }

    function save() {
        localStorage.setItem('tasks_elite', JSON.stringify(tasks));
        localStorage.setItem('cats_elite', JSON.stringify(categories));
        localStorage.setItem('folded_elite', JSON.stringify(folded));
        updateProgress();
    }

    function updateCols(val) {
        document.documentElement.style.setProperty('--cols', val);
        document.getElementById('colVal').innerText = val + " Columns";
        localStorage.setItem('pref_cols', val);
    }

    function render() {
        const container = document.getElementById('sections-container');
        container.innerHTML = '';

        categories.forEach(cat => {
            const collapsed = folded[cat.id] ? 'collapsed' : '';
            const catTasks = tasks.filter(t => t.catId === cat.id || t.category === cat.id);

            const html = `
                <div class="section-wrapper ${collapsed}" id="sec-${cat.id}" draggable="true" ondragstart="dragSection(event)">
                    <div class="section-header" style="background:${cat.color}" onclick="toggleFold('${cat.id}')">
                        <span contenteditable="true" onclick="event.stopPropagation()" onblur="updateCatName('${cat.id}', this.innerText)">${cat.name}</span>
                        <div class="header-btns">
                            <input type="color" value="${cat.color}" onchange="updateCatColor('${cat.id}', this.value)" style="width:30px;height:30px;border:none;border-radius:50%;cursor:pointer;">
                            <button onclick="event.stopPropagation();addTask('${cat.id}')" style="background:white;color:black;">+ Task</button>
                            ${cat.id === categories[0].id ? `<button onclick="event.stopPropagation();resetChecks()" style="background:#ffc107;color:black;">RESET</button>` : ''}
                            <button onclick="event.stopPropagation();deleteSection('${cat.id}')" style="background:rgba(0,0,0,0.3);color:white;">DEL</button>
                        </div>
                    </div>
                    <div class="task-grid" ondragover="allowDrop(event)" ondrop="dropTask(event, '${cat.id}')">
                        ${catTasks.map(t => renderTask(t)).join('')}
                    </div>
                </div>`;
            container.innerHTML += html;
        });

        updateProgress();
        updateMLGS();
    }

    function renderTask(t) {
        const moveOptions = categories.map(c => `<option value="${c.id}" ${(t.catId === c.id || t.category === c.id) ? 'selected' : ''}>→ ${c.name}</option>`).join('');

        return `
            <div class="task-item" id="${t.id}" draggable="true" ondragstart="dragTask(event)">
                <button class="del-task" onclick="deleteTask('${t.id}')">×</button>
                
                <div class="task-top">
                    <input type="checkbox" class="task-check" ${t.checked ? 'checked' : ''} onchange="toggleCheck('${t.id}')">
                    <div class="task-name" contenteditable="true" onblur="updateTask('${t.id}', 'name', this.innerText)">${t.name}</div>
                </div>

                <a href="${t.url || '#'}" target="_blank" class="link-btn" 
                   style="background:${t.btnColor || (t.id==='t1' ? '#007bff' : '#28a745')}" 
                   onclick="handleMLGSClick('${t.id}')">${t.btnText || 'OPEN LINK'}</a>

                <small class="edit-link-btn" onclick="editLink('${t.id}')">✏️ Edit URL & Button</small>

                ${t.id === 't1' ? '<div id="mlgs-timer" style="font-size:11px;text-align:center;font-weight:bold;color:red;"></div>' : ''}

                <div class="task-note" contenteditable="true" onblur="updateTask('${t.id}', 'note', this.innerText)">${t.note || 'Add notes here...'}</div>

                <div>
                    <span class="status-badge" style="background:${getStatusColor(t.status)}" onclick="cycleStatus('${t.id}')">
                        ${t.status || 'Active'}
                    </span>
                </div>

                <select class="move-menu" onchange="moveTask('${t.id}', this.value)">
                    <option disabled selected>Quick Move...</option>
                    ${moveOptions}
                </select>
            </div>`;
    }

    function getStatusColor(status) {
        if (status === "Testing") return "#ffc107";
        if (status === "Paused") return "#6c757d";
        return "#28a745";
    }

    // ==================== NEW: Edit Link ====================
    function editLink(id) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;

        const newUrl = prompt("Enter full URL:", task.url || "https://");
        if (newUrl === null) return;

        const newBtnText = prompt("Button text:", task.btnText || "OPEN LINK");
        if (newBtnText === null) return;

        task.url = newUrl;
        task.btnText = newBtnText;
        save();
        render();
    }

    function resetChecks() {
        if (confirm("Reset all checkboxes in this section?")) {
            tasks.forEach(t => { if (t.catId === categories[0].id || t.category === categories[0].id) t.checked = false; });
            save(); render();
        }
    }

    // Rest of functions (same as previous)
    function toggleCheck(id) {
        const task = tasks.find(t => t.id === id);
        if (task) task.checked = !task.checked;
        save();
    }

    function updateTask(id, key, value) {
        const task = tasks.find(t => t.id === id);
        if (task) task[key] = value;
        save();
    }

    function updateCatName(id, name) {
        const cat = categories.find(c => c.id === id);
        if (cat) cat.name = name;
        save();
    }

    function updateCatColor(id, color) {
        const cat = categories.find(c => c.id === id);
        if (cat) {
            cat.color = color;
            save();
            render();
        }
    }

    function addTask(catId) {
        const name = prompt("Enter task name:");
        if (!name) return;
        tasks.push({ 
            id: 't' + Date.now(), 
            catId, 
            name, 
            url: 'https://', 
            btnText: 'OPEN LINK', 
            btnColor: '#007bff',
            checked: false, 
            note: '', 
            status: 'Active' 
        });
        save(); render();
    }

    function createNewSection() {
        const name = prompt("New category name:");
        if (!name) return;
        categories.push({ id: 'c' + Date.now(), name, color: '#007bff' });
        save(); render();
    }

    function deleteTask(id) { if(confirm("Delete task?")) { tasks = tasks.filter(t => t.id !== id); save(); render(); }}
    function deleteSection(id) { 
        if(confirm("Delete section and all tasks?")) { 
            categories = categories.filter(c => c.id !== id); 
            tasks = tasks.filter(t => t.catId !== id && t.category !== id); 
            save(); render(); 
        }
    }

    function moveTask(taskId, newCatId) {
        const task = tasks.find(t => t.id === taskId);
        if (task) task.catId = newCatId;
        save(); render();
    }

    function cycleStatus(id) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        const s = ["Active","Testing","Paused"];
        task.status = s[(s.indexOf(task.status||"Active")+1)%3];
        save(); render();
    }

    function toggleFold(id) {
        folded[id] = !folded[id];
        save(); render();
    }

    // Drag & Drop + Progress + MLGS (unchanged from last version)
    let draggedId = null, draggedType = null;
    function dragTask(e) { draggedId = e.target.id; draggedType = "task"; }
    function dragSection(e) { draggedId = e.currentTarget.id; draggedType = "section"; }
    function allowDrop(e) { e.preventDefault(); }

    function dropTask(e, targetCatId) {
        e.preventDefault();
        if (draggedType !== "task") return;
        const task = tasks.find(t => t.id === draggedId);
        if (task) task.catId = targetCatId;
        save(); render();
    }

    function dropSection(e) {
        e.preventDefault();
        if (draggedType !== "section") return;
        const targetId = e.currentTarget.id;
        const fromIdx = categories.findIndex(c => `sec-${c.id}` === draggedId);
        const toIdx = categories.findIndex(c => `sec-${c.id}` === targetId);
        if (fromIdx < 0 || toIdx < 0) return;
        const [moved] = categories.splice(fromIdx, 1);
        categories.splice(toIdx, 0, moved);
        save(); render();
    }

    function updateProgress() {
        const total = tasks.length;
        const done = tasks.filter(t => t.checked).length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        const bar = document.getElementById('progress-bar');
        bar.style.width = pct + '%';
        bar.innerText = `Daily Goal: ${pct}% (${done}/${total})`;
    }

    function handleMLGSClick(id) {
        if (id === 't1') {
            localStorage.setItem('mlgs_time', Date.now() + 23*60*60*1000);
            updateMLGS();
        }
    }

    function updateMLGS() {
        const el = document.getElementById('mlgs-timer');
        if (!el) return;
        const next = localStorage.getItem('mlgs_time');
        if (!next) return;
        const diff = parseInt(next) - Date.now();
        if (diff > 0) {
            const d = new Date(parseInt(next));
            const h = d.getHours();
            const m = d.getMinutes().toString().padStart(2,'0');
            el.innerText = `NEXT MAIL: ${h%12||12}:${m} ${h>=12?'PM':'AM'}`;
        } else { el.innerText = "READY!"; }
    }

    function exportBackup() {
        const data = { tasks, categories, folded };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Traffic_Command_Elite_Full_Backup.json";
        a.click();
    }

    function importBackup(e) {
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const d = JSON.parse(ev.target.result);
                if (d.tasks) tasks = d.tasks;
                if (d.categories) categories = d.categories;
                if (d.folded) folded = d.folded;
                save(); render();
                alert("✅ Restore successful!");
            } catch(err) { alert("Invalid backup file"); }
        };
        reader.readAsText(e.target.files[0]);
    }

    window.onload = () => {
        migrateData();
        const savedCols = localStorage.getItem('pref_cols') || 4;
        document.getElementById('colSlider').value = savedCols;
        updateCols(savedCols);
        render();
        setInterval(updateMLGS, 60000);
    };
</script>
</body>
</html>
